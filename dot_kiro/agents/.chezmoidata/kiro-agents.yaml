kiro:
  base_tools:
    read_only:
      - code
      - glob
      - grep
      - introspect
      - knowledge
      - read
      - report
      - shell
      - subagent
      - switch_to_execution
      - todo_list
      - tool_search
      - web_fetch
      - web_search
    write:
      - shell
      - use_aws
      - write
    delete: []

  tool_settings:
    base:
      shell:
        allowedCommands:
          - "awk .*"
          - "cat .*"
          - "find .*"
          - "git fetch"
          - "git status"
          - "grep .*"
          - "head .*"
          - "helm get"
          - "kubectl get"
          - "ls .*"
          - "sed .*"
          - "sort .*"
          - "tail .*"
          - "which .*"
        deniedCommands:
          - "git push .*"
        autoAllowReadonly: true
      read:
        allowedPaths:
          - "./**"
          - "~/.config/**"
          - "~/git/**"
        deniedPaths:
          - "~/.aws/credentials"
      glob:
        allowedPaths:
          - "./**"
        deniedPaths: []
        allowReadOnly: true
      grep:
        allowReadOnly: true
      write:
        allowedPaths:
          - "./**"
      aws:
        autoAllowReadonly: true

    write_docs:
      write:
        allowedPaths:
          - "./docs/**"

  mcp_servers:
    ent_a2rm:
      name: ent-a2rm
      config:
        command: ent-a2rm-mcp
        timeout: 120000
      allowed_tools:
        read_only:
          - "a2rm___call_api"
          - "a2rm___list_*"
          - "a2rm___query_*"
          - "a2rm___retrieve_*"
          - "a2rm___run_script"
        write:
          - "a2rm___call_api_mutate"
        delete:
          - "a2rm___call_api_delete"

    ent_confluence:
      name: ent-confluence
      config:
        command: ent-confluence-mcp
      allowed_tools:
        read_only:
          - "download_*"
          - "get_*"
          - "list_*"
          - "search_*"
        write:
          - "add_*"
          - "create_*"
          - "highlight_*"
          - "move_*"
          - "patch_*"
          - "update_*"
          - "upload_*"
          - "revert_*"
        delete:
          - "delete_*"

    ent_jira:
      name: ent-jira
      config:
        command: ent-jira-mcp
      allowed_tools:
        read_only:
          - "get_*"
          - "list_*"
          - "lookup_*"
          - "search_*"
        write:
          - "add_*"
          - "create_*"
          - "edit_*"
          - "transition_*"
        delete: []

    ent_msgraph:
      name: ent-msgraph
      config:
        command: ent-msgraph-mcp
      allowed_tools:
        read_only:
          - "download_*"
          - "get_*"
          - "list_*"
          - "read_*"
          - "search_*"
        write: []
        delete: []

    ent_gitlab:
      name: ent-gitlab
      config:
        command: ent-gitlab-mcp
        timeout: 120000
      allowed_tools:
        read_only:
          - gitlab___list_services
          - gitlab___call_api
          - gitlab___download_repository
        write:
          - gitlab___call_api_mutate
          - gitlab___run_script
        delete:
          - gitlab___call_api_delete

    gitlab:
      name: gitlab
      config:
        __comment: "https://github.com/zereight/gitlab-mcp"
        command: npx
        args:
          - "-y"
          - "@zereight/mcp-gitlab"
        env:
          GITLAB_USE_OAUTH: "true"
          GITLAB_OAUTH_CLIENT_ID: "f65139ee21c22e436a3297901413499ea213b059ee93c1bc1009e455abeb33a0"
          GITLAB_OAUTH_REDIRECT_URI: "http://127.0.0.1:8888/callback"
          GITLAB_API_URL: "https://scm.tpicapcloud.com/api/v4"
      allowed_tools:
        read_only: []
        write: []
        delete: []

    atlassian:
      name: atlassian
      config:
        url: "https://mcp.atlassian.com/v1/mcp"
        type: remote
      allowed_tools:
        read_only:
          - "get*"
          - "search*"
          - "atlassianUserInfo"
          - "fetch"
          - "search"
        write:
          - "add*"
          - "create*"
          - "edit*"
          - "update*"
          - "transition*"
        delete: []

    chrome:
      name: chrome
      config_linux:
        command: ~/.config/mcp/chrome-mcp.sh
      config_windows:
        command: pwsh
        args:
          - -NoProfile
          - -Command
          - "& $HOME/.config/mcp/chrome-mcp.ps1"
      allowed_tools:
        read_only:
          - "get_*"
          - "list_*"
          - "take_*"
          - "lighthouse_*"
          - "performance_*"
        write:
          - "click"
          - "close_*"
          - "drag"
          - "emulate"
          - "evaluate_*"
          - "fill"
          - "fill_*"
          - "handle_*"
          - "hover"
          - "navigate_*"
          - "new_*"
          - "press_*"
          - "resize_*"
          - "select_*"
          - "type_*"
          - "upload_*"
          - "wait_*"
        delete: []

    grafana_non_prod:
      name: grafana_non_prod
      config:
        command: uvx
        args:
          - "--with"
          - "fastmcp"
          - "--quiet"
          - "python"
          - "~/.config/mcp/mcp-prefix-proxy.py"
          - "non_prod"
          - "--"
          - "pwsh"
          - "-NoProfile"
          - "-File"
          - "~/.config/mcp/grafana-non-prod.ps1"
      allowed_tools:
        read_only:
          - "non_prod_get_*"
          - "non_prod_list_*"
          - "non_prod_search_*"
          - "non_prod_find_*"
          - "non_prod_query_*"
          - "non_prod_generate_deeplink"
        write:
          - "non_prod_create_*"
          - "non_prod_update_*"
        delete: []

    grafana_prod:
      name: grafana_prod
      config:
        command: uvx
        args:
          - "--with"
          - "fastmcp"
          - "--quiet"
          - "python"
          - "~/.config/mcp/mcp-prefix-proxy.py"
          - "prod"
          - "--"
          - "pwsh"
          - "-NoProfile"
          - "-File"
          - "~/.config/mcp/grafana-prod.ps1"
      allowed_tools:
        read_only:
          - "prod_get_*"
          - "prod_list_*"
          - "prod_search_*"
          - "prod_find_*"
          - "prod_query_*"
          - "prod_generate_deeplink"
        write:
          - "prod_create_*"
          - "prod_update_*"
        delete: []

    grafana_non_prod_remote:
      name: grafana-non-prod-remote
      config:
        __comment: "https://github.com/grafana/mcp-grafana"
        url: "https://grafana-mcp.non-prod.emea.observability.tpicapcloud.com/mcp"
        type: remote
      allowed_tools:
        read_only:
          - "get_*"
          - "list_*"
          - "search_*"
          - "find_*"
          - "query_*"
          - "generate_deeplink"
        write:
          - "create_*"
          - "update_*"
        delete: []

    grafana_prod_remote:
      name: grafana-prod-remote
      config:
        __comment: "https://github.com/grafana/mcp-grafana"
        url: "https://grafana-mcp.prod.emea.observability.tpicapcloud.com/mcp"
        type: remote
      allowed_tools:
        read_only:
          - "get_*"
          - "list_*"
          - "search_*"
          - "find_*"
          - "query_*"
          - "generate_deeplink"
        write: []
        delete: []

    aws:
      name: aws
      config:
        _comment: "https://docs.aws.amazon.com/agent-toolkit/latest/userguide/mcp-server.html"
        command: uvx
        timeout: 100000
        transport: stdio
        args:
          - "mcp-proxy-for-aws@latest"
          - "https://aws-mcp.eu-central-1.api.aws/mcp"
          - "--metadata"
          - "AWS_REGION=eu-west-1"
      allowed_tools:
        read_only:
          - "aws___get_*"
          - "aws___list_*"
          - "aws___read_*"
          - "aws___recommend"
          - "aws___retrieve_skill"
          - "aws___search_*"
          - "aws___suggest_*"
        write:
          - "aws___call_aws"
          - "aws___run_script"
        delete: []

    aws_iac:
      name: awslabs.aws-iac-mcp-server
      config:
        __comment: "https://github.com/awslabs/mcp/tree/main/src/aws-iac-mcp-server"
        command: uvx
        args:
          - "awslabs.aws-iac-mcp-server@latest"
        env:
          FASTMCP_LOG_LEVEL: ERROR
        disabled: false
        autoApprove: []
      allowed_tools:
        read_only: []
        write: []
        delete: []

    aws_eks:
      name: awslabs.eks-mcp-server
      config:
        __comment: "https://github.com/awslabs/mcp/tree/main/src/eks-mcp-server"
        command: uvx
        args:
          - "awslabs.eks-mcp-server@latest"
          - "--allow-write"
          - "--allow-sensitive-data-access"
        env:
          FASTMCP_LOG_LEVEL: ERROR
        disabled: false
        autoApprove: []
      allowed_tools:
        read_only: []
        write: []
        delete: []

  resources:
    - "file://AGENTS.md"
    - "file://README.md"
    - "skill://.kiro/skills/*/SKILL.md"
    - "skill://~/.kiro/skills/*/SKILL.md"
